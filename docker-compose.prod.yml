services:
  app:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vocab.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.vocab.entrypoints=websecure"
      - "traefik.http.routers.vocab.tls.certresolver=cloudflare"
      - "traefik.http.services.vocab.loadbalancer.server.port=3000"
    networks:
      - proxy

networks:
  proxy:
    external: true
